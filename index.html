<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heron & Oak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0a08;
    --bg-elevated: #18130e;
    --bg-card: #1d1712;
    --hairline: #3a3022;
    --hairline-bright: #5c4d34;
    --gold: #c9a35e;
    --gold-bright: #e8c87e;
    --gold-dim: #b08f4f;
    --burgundy: #7a2c38;
    --burgundy-bright: #a33f4d;
    --text: #f5ece0;
    --text-dim: #b3a591;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'EB Garamond', Georgia, serif;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background:
      radial-gradient(ellipse 1200px 600px at 50% -10%, rgba(184,146,79,0.06), transparent),
      var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 17px;
    min-height: 100vh;
  }

  ::selection{ background: var(--gold-dim); color: #fff; }

  header{
    padding: 48px 24px 28px;
    text-align: center;
    border-bottom: 1px solid var(--hairline);
    position: relative;
  }

  header::after{
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 70px; height: 1px;
    background: var(--gold);
  }

  header .eyebrow{
    font-family: var(--font-body);
    font-style: italic;
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin: 0 0 10px;
  }

  header h1{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 2.6rem;
    margin: 0 0 10px;
    letter-spacing: 1px;
    color: var(--text);
  }

  header h1 .amp{
    color: var(--gold-bright);
    font-style: italic;
    font-weight: 500;
  }

  header p.tagline{
    margin: 0 0 18px;
    color: var(--text-dim);
    font-size: 0.95rem;
    font-style: italic;
  }

  #status-line{
    font-size: 0.78rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
    letter-spacing: 0.3px;
    margin-bottom: 28px;
  }

  #status-line .btn-row{ display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  #status-text{ display: none; }

  #status-line button{
    background: none;
    border: 1px solid var(--hairline-bright);
    color: var(--text-dim);
    border-radius: 0;
    padding: 5px 14px;
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: var(--font-body);
    transition: border-color 0.2s, color 0.2s;
  }
  #status-line button:hover{ border-color: var(--gold); color: var(--gold-bright); }
  #status-line button#reset-btn:hover{ border-color: var(--burgundy-bright); color: var(--burgundy-bright); }
  #status-line button#home-btn:hover{ border-color: var(--gold); color: var(--gold-bright); }

  /* Landing view */
  #landing-view{
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px 24px;
  }

  .cta-button-secondary{
    display: inline-block;
    background: none;
    border: 1px solid var(--hairline-bright);
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 12px 30px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: border-color 0.2s, color 0.2s;
  }
  .cta-button-secondary:hover{ border-color: var(--gold); color: var(--gold-bright); }

  main{
    padding: 36px 24px 70px;
    max-width: 1080px;
    margin: 0 auto;
  }

  .controls{
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 30px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--hairline);
  }

  .search-row, .filter-row{
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Mode themes — override the gold trio; nearly every accent in this
     stylesheet reads from these three variables, so swapping them on
     <body> recolors buttons, tags, hovers, and headers in one move. */
  body.mode-alcoholic{
    --gold: #c98a3f;
    --gold-bright: #e8a85e;
    --gold-dim: #a8702f;
  }
  body.mode-nonalcoholic{
    --gold: #5f9e82;
    --gold-bright: #84c9a4;
    --gold-dim: #4d7e68;
  }

  .toggle-group{
    display: flex;
    flex: 1 1 220px;
    border: 1px solid var(--hairline-bright);
  }
  .toggle-btn{
    flex: 1;
    background: var(--bg-card);
    border: none;
    border-right: 1px solid var(--hairline-bright);
    color: var(--text-dim);
    padding: 11px 14px;
    font-size: 0.85rem;
    font-family: var(--font-body);
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .toggle-btn:last-child{ border-right: none; }
  .toggle-btn:hover{ color: var(--text); }
  .toggle-btn.active{
    background: var(--gold-dim);
    color: #16110d;
    font-weight: 600;
  }

  input[type="text"], select{
    background: var(--bg-card);
    border: 1px solid var(--hairline-bright);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 0;
    font-size: 0.95rem;
    font-family: var(--font-body);
    flex: 1 1 220px;
  }

  select{ cursor: pointer; }

  input[type="text"]::placeholder{ color: var(--text-dim); font-style: italic; }

  input[type="text"]:focus, select:focus{
    outline: none;
    border-color: var(--gold);
  }

  .filter-row select{ flex: 1 1 220px; }

  #result-count{
    font-size: 0.78rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin: 0 0 22px;
    text-align: center;
  }

  #drink-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 1px;
    background: var(--hairline);
    border: 1px solid var(--hairline);
  }

  .drink-card{
    background: var(--bg-card);
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .drink-card:hover, .drink-card:focus-visible{
    background: var(--bg-elevated);
    outline: none;
  }
  .drink-card:hover .name, .drink-card:focus-visible .name{ color: var(--gold-bright); }

  .drink-card .img-wrap{
    position: relative;
    overflow: hidden;
  }
  .drink-card img{
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: var(--bg-elevated);
    filter: saturate(0.92) brightness(0.96);
    transition: filter 0.2s;
  }
  .drink-card:hover img{ filter: saturate(1.05) brightness(1.02); }

  .drink-card .name{
    padding: 14px 14px 4px;
    font-family: var(--font-display);
    font-size: 1.02rem;
    line-height: 1.3;
    color: var(--text);
    transition: color 0.2s;
  }
  .drink-card .meta{
    padding: 0 14px 16px;
    font-size: 0.72rem;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #empty-state{
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
    padding: 60px 20px;
    display: none;
  }

  /* Detail overlay */
  #detail-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,4,3,0.92);
    z-index: 50;
    overflow-y: auto;
    padding: 30px 20px;
  }
  #detail-overlay.open{ display: block; }

  .detail-card{
    max-width: 620px;
    margin: 0 auto;
    background: var(--bg-elevated);
    border: 1px solid var(--hairline-bright);
  }

  .detail-close{
    position: sticky;
    top: 0;
    text-align: right;
    padding: 12px 14px;
    background: var(--bg-elevated);
    z-index: 2;
    border-bottom: 1px solid var(--hairline);
  }
  .detail-close button{
    background: none;
    border: 1px solid var(--hairline-bright);
    color: var(--text-dim);
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: var(--font-body);
  }
  .detail-close button:hover{ border-color: var(--gold); color: var(--gold-bright); }

  .detail-img-wrap{
    width: 100%;
    background: var(--bg-card);
  }
  .detail-img-wrap img{
    width: 100%;
    max-height: 360px;
    object-fit: cover;
    display: block;
    filter: saturate(0.95);
  }

  .detail-body{ padding: 30px 36px 40px; }

  .detail-body h2{
    font-family: var(--font-display);
    font-weight: 600;
    margin: 0 0 12px;
    font-size: 1.9rem;
    color: var(--text);
  }

  .detail-tags{
    display: flex;
    gap: 0;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .detail-tags span{
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--gold-bright);
    border-right: 1px solid var(--hairline-bright);
    padding: 0 12px 0 0;
    margin-right: 12px;
  }
  .detail-tags span:last-child{ border-right: none; }

  .detail-section-label{
    font-family: var(--font-display);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--gold-dim);
    margin: 28px 0 12px;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 8px;
  }

  ul.ingredient-list{
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ul.ingredient-list li{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--hairline);
    font-size: 0.95rem;
  }
  ul.ingredient-list li .measure{
    color: var(--gold-bright);
    text-align: right;
    padding-left: 14px;
    font-style: italic;
    white-space: nowrap;
  }

  .instructions{
    font-size: 1rem;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-line;
  }

  #loading-overlay{
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #loading-overlay.hidden{ display: none; }
  .spinner{
    width: 1px; height: 32px;
    background: var(--gold);
    animation: pour 1.1s ease-in-out infinite;
    transform-origin: top;
  }
  @keyframes pour{
    0%, 100%{ transform: scaleY(0.3); opacity: 0.4; }
    50%{ transform: scaleY(1); opacity: 1; }
  }
  #loading-text{
    color: var(--text);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1.05rem;
  }
  #loading-progress{ color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }

  .cta-button{
    display: inline-block;
    margin: 6px 0 22px;
    background: var(--gold);
    border: none;
    color: #16110d;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 600;
    font-size: 1.05rem;
    padding: 12px 30px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.15s;
  }
  .cta-button:hover{ background: var(--gold-bright); transform: translateY(-1px); }

  /* Mood quiz overlay */
  #mood-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,4,3,0.92);
    z-index: 60;
    overflow-y: auto;
    padding: 30px 20px;
  }
  #mood-overlay.open{ display: block; }

  .mood-card{
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg-elevated);
    border: 1px solid var(--hairline-bright);
    min-height: 320px;
  }

  #mood-step-container{
    padding: 10px 36px 44px;
    text-align: center;
  }

  .mood-progress{
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin: 0 0 18px;
  }

  .mood-question{
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--text);
    margin: 0 0 28px;
  }

  .mood-options{
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .mood-option-btn{
    background: var(--bg-card);
    border: 1px solid var(--hairline-bright);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 13px 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .mood-option-btn:hover{
    border-color: var(--gold);
    background: var(--bg-elevated);
    color: var(--gold-bright);
  }

  .mood-back-btn{
    margin-top: 22px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 0.8rem;
    text-decoration: underline;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .mood-back-btn:hover{ color: var(--gold-bright); }

  /* Mood result note + actions, shown inside the existing detail card */
  #mood-note{
    display: none;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin: 0 0 16px;
  }
  #mood-actions{
    display: none;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  #mood-actions button{
    background: none;
    border: 1px solid var(--hairline-bright);
    color: var(--text-dim);
    padding: 8px 16px;
    font-size: 0.78rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: var(--font-body);
  }
  #mood-actions button:hover{ border-color: var(--gold); color: var(--gold-bright); }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Loading catalog…</div>
  <div id="loading-progress"></div>
</div>

<header>
  <p class="eyebrow">Established on TheCocktailDB</p>
  <h1>Heron <span class="amp">&amp;</span> Oak</h1>
  <p class="tagline">A private catalog of the world's cocktails</p>
</header>

<div id="landing-view">
  <button id="landing-mood-btn" class="cta-button">Find Me a Drink</button>
  <button id="landing-browse-btn" class="cta-button-secondary">Browse All Drinks</button>
</div>

<main id="browse-view" style="display:none;">
  <div id="status-line">
    <span id="status-text"></span>
    <span class="btn-row">
      <button id="home-btn">← Home</button>
      <button id="mood-btn">Find Me a Drink</button>
      <button id="refresh-btn">Refresh</button>
      <button id="reset-btn">Reset</button>
    </span>
  </div>

  <div class="controls">
    <div class="search-row">
      <input type="text" id="name-search" placeholder="Search by drink name…">
      <input type="text" id="ingredient-search" placeholder="Search by ingredient (e.g. lime juice)…">
    </div>
    <div class="filter-row">
      <select id="main-ingredient-filter">
        <option value="">All main ingredients</option>
      </select>
      <div class="toggle-group" id="alc-toggle">
        <button type="button" class="toggle-btn" id="alc-btn-alcoholic" data-value="Alcoholic">Alcoholic</button>
        <button type="button" class="toggle-btn" id="alc-btn-nonalcoholic" data-value="Non alcoholic">Non-Alcoholic</button>
      </div>
    </div>
  </div>

  <p id="result-count"></p>
  <div id="drink-grid"></div>
  <div id="empty-state">No drinks match your filters. Try clearing one of them.</div>
</main>

<div id="detail-overlay">
  <div class="detail-card">
    <div class="detail-close"><button id="close-detail">Close ✕</button></div>
    <div class="detail-img-wrap"><img id="detail-img" alt=""></div>
    <div class="detail-body">
      <h2 id="detail-name"></h2>
      <div class="detail-tags" id="detail-tags"></div>
      <p id="mood-note"></p>
      <div id="mood-actions">
        <button id="mood-another-btn" type="button">Suggest another</button>
        <button id="mood-retake-btn" type="button">Retake the quiz</button>
      </div>
      <div class="detail-section-label">Ingredients</div>
      <ul class="ingredient-list" id="detail-ingredients"></ul>
      <div class="detail-section-label">How to make it</div>
      <p class="instructions" id="detail-instructions"></p>
    </div>
  </div>
</div>

<div id="mood-overlay">
  <div class="mood-card">
    <div class="detail-close"><button id="mood-close-btn">Close ✕</button></div>
    <div id="mood-step-container"></div>
  </div>
</div>

<script>
(function(){
  'use strict';

  const API_BASE = 'https://www.thecocktaildb.com/api/json/v1/1/';
  const CACHE_KEY = 'backbar_catalog_v1';
  const CACHE_TIME_KEY = 'backbar_catalog_time_v1';
  const LETTERS = 'abcdefghijklmnopqrstuvwxyz'.split('');

  let catalog = []; // flat array of drink objects from the API
  let alcMode = ''; // '' = all, 'Alcoholic', or 'Non alcoholic'

  const LOADING_MESSAGES = [
    'Finding the drinking glasses…',
    'Wiping down the bar…',
    'Counting the bottles…',
    'Untangling the garnish drawer…',
    'Chasing down a wandering olive…',
    'Convincing the shaker to cooperate…',
    'Restocking the bitters…',
    'Polishing the cocktail menu…',
    'Bribing the bartender for recipes…',
    'Sorting limes from lemons…',
  ];
  let loadingMessageTimer = null;

  function startLoadingMessages(){
    let i = Math.floor(Math.random() * LOADING_MESSAGES.length);
    els.loadingText.textContent = LOADING_MESSAGES[i];
    loadingMessageTimer = setInterval(() => {
      i = (i + 1) % LOADING_MESSAGES.length;
      els.loadingText.textContent = LOADING_MESSAGES[i];
    }, 1400);
  }

  function stopLoadingMessages(){
    clearInterval(loadingMessageTimer);
    loadingMessageTimer = null;
  }

  const els = {
    loadingOverlay: document.getElementById('loading-overlay'),
    loadingText: document.getElementById('loading-text'),
    loadingProgress: document.getElementById('loading-progress'),
    statusText: document.getElementById('status-text'),
    refreshBtn: document.getElementById('refresh-btn'),
    resetBtn: document.getElementById('reset-btn'),
    nameSearch: document.getElementById('name-search'),
    ingredientSearch: document.getElementById('ingredient-search'),
    mainIngredientFilter: document.getElementById('main-ingredient-filter'),
    alcBtnAlcoholic: document.getElementById('alc-btn-alcoholic'),
    alcBtnNonalcoholic: document.getElementById('alc-btn-nonalcoholic'),
    resultCount: document.getElementById('result-count'),
    grid: document.getElementById('drink-grid'),
    emptyState: document.getElementById('empty-state'),
    detailOverlay: document.getElementById('detail-overlay'),
    closeDetail: document.getElementById('close-detail'),
    detailImg: document.getElementById('detail-img'),
    detailName: document.getElementById('detail-name'),
    detailTags: document.getElementById('detail-tags'),
    detailIngredients: document.getElementById('detail-ingredients'),
    detailInstructions: document.getElementById('detail-instructions'),
    moodBtn: document.getElementById('mood-btn'),
    landingView: document.getElementById('landing-view'),
    landingMoodBtn: document.getElementById('landing-mood-btn'),
    landingBrowseBtn: document.getElementById('landing-browse-btn'),
    browseView: document.getElementById('browse-view'),
    homeBtn: document.getElementById('home-btn'),
    moodOverlay: document.getElementById('mood-overlay'),
    moodCloseBtn: document.getElementById('mood-close-btn'),
    moodStepContainer: document.getElementById('mood-step-container'),
    moodNote: document.getElementById('mood-note'),
    moodActions: document.getElementById('mood-actions'),
    moodAnotherBtn: document.getElementById('mood-another-btn'),
    moodRetakeBtn: document.getElementById('mood-retake-btn'),
  };

  // ---- Catalog loading ----------------------------------------------

  async function fetchLetter(letter){
    const res = await fetch(`${API_BASE}search.php?f=${letter}`);
    const data = await res.json();
    return data.drinks || [];
  }

  function trimForCache(drinks){
    // We only ever read strInstructions (English) in this app, but the API
    // returns 6 extra translated copies per drink (ES/DE/FR/IT/ZH-HANS/ZH-HANT).
    // Dropping those roughly halves the payload size before it hits localStorage.
    const dropKeys = ['strInstructionsES','strInstructionsDE','strInstructionsFR','strInstructionsIT','strInstructionsZH-HANS','strInstructionsZH-HANT','strImageSource','strImageAttribution','strCreativeCommonsConfirmed','strDrinkAlternate'];
    return drinks.map(d => {
      const copy = { ...d };
      dropKeys.forEach(k => delete copy[k]);
      return copy;
    });
  }

  async function buildCatalog(){
    els.loadingOverlay.classList.remove('hidden');
    startLoadingMessages();
    const results = [];
    let cachedOk = false;
    try {
      for (let i = 0; i < LETTERS.length; i++){
        const letter = LETTERS[i];
        els.loadingProgress.textContent = `${letter.toUpperCase()} · ${i + 1}/${LETTERS.length}`;
        try {
          const drinks = await fetchLetter(letter);
          results.push(...drinks);
        } catch (err) {
          console.error('Failed to fetch letter', letter, err);
        }
      }
      catalog = results;
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(trimForCache(catalog)));
        localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
        cachedOk = true;
      } catch (err) {
        // Most likely QuotaExceededError: the full catalog (~600 drinks x
        // 5 language fields + 30 ingredient/measure fields each) can exceed
        // a browser's localStorage limit (commonly 5-10MB). The app still
        // works fine for this session using the in-memory `catalog` array;
        // it just won't be cached for next time.
        console.warn('Could not cache catalog to localStorage (likely quota exceeded). Continuing without cache.', err);
      }
    } finally {
      stopLoadingMessages();
      els.loadingOverlay.classList.add('hidden');
    }
    if (cachedOk){
      updateStatusLine();
    } else {
      els.statusText.textContent = `${catalog.length} drinks loaded (not cached — storage quota exceeded)`;
    }
  }

  function loadCatalogFromCache(){
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    try {
      catalog = JSON.parse(raw);
      return Array.isArray(catalog) && catalog.length > 0;
    } catch {
      return false;
    }
  }

  function updateStatusLine(){
    const ts = Number(localStorage.getItem(CACHE_TIME_KEY) || 0);
    const when = ts ? new Date(ts).toLocaleString() : 'unknown';
    els.statusText.textContent = `${catalog.length} drinks cached · last updated ${when}`;
  }

  // ---- Filter UI population ------------------------------------------

  function populateMainIngredientFilter(){
    const set = new Set();
    catalog.forEach(d => { if (d.strIngredient1) set.add(d.strIngredient1.trim()); });
    const sorted = Array.from(set).sort((a, b) => a.localeCompare(b));
    els.mainIngredientFilter.innerHTML = '<option value="">All main ingredients</option>' +
      sorted.map(i => `<option value="${escapeAttr(i)}">${escapeHtml(i)}</option>`).join('');
  }

  // ---- Filtering / rendering ------------------------------------------

  function getAllIngredients(drink){
    const list = [];
    for (let i = 1; i <= 15; i++){
      const ing = drink['strIngredient' + i];
      if (ing) list.push(ing.trim());
    }
    return list;
  }

  function applyFilters(){
    const nameQ = els.nameSearch.value.trim().toLowerCase();
    const ingQ = els.ingredientSearch.value.trim().toLowerCase();
    const mainIng = els.mainIngredientFilter.value;
    const alcFilter = alcMode;

    const filtered = catalog.filter(d => {
      if (nameQ && !(d.strDrink || '').toLowerCase().includes(nameQ)) return false;
      if (ingQ){
        const ings = getAllIngredients(d).join(' ').toLowerCase();
        if (!ings.includes(ingQ)) return false;
      }
      if (mainIng && (d.strIngredient1 || '').trim() !== mainIng) return false;
      if (alcFilter && (d.strAlcoholic || '') !== alcFilter) return false;
      return true;
    });

    renderGrid(filtered);
  }

  function renderGrid(drinks){
    els.resultCount.textContent = `${drinks.length} drink${drinks.length === 1 ? '' : 's'}`;
    els.grid.innerHTML = '';
    els.emptyState.style.display = drinks.length === 0 ? 'block' : 'none';

    const frag = document.createDocumentFragment();
    drinks.forEach(d => {
      const card = document.createElement('div');
      card.className = 'drink-card';
      card.tabIndex = 0;
      card.innerHTML = `
        <div class="img-wrap"><img src="${escapeAttr(d.strDrinkThumb)}/small" loading="lazy" alt="${escapeAttr(d.strDrink)}"></div>
        <div class="name">${escapeHtml(d.strDrink)}</div>
        <div class="meta">${escapeHtml(d.strCategory || '')}</div>
      `;
      card.addEventListener('click', () => openDetail(d));
      card.addEventListener('keypress', (e) => { if (e.key === 'Enter') openDetail(d); });
      frag.appendChild(card);
    });
    els.grid.appendChild(frag);
  }

  // ---- Detail view ------------------------------------------------------

  function openDetail(drink, opts){
    opts = opts || {};
    els.detailImg.src = drink.strDrinkThumb || '';
    els.detailImg.alt = drink.strDrink || '';
    els.detailName.textContent = drink.strDrink || '';

    const tags = [];
    if (drink.strCategory) tags.push(drink.strCategory);
    if (drink.strAlcoholic) tags.push(drink.strAlcoholic);
    if (drink.strGlass) tags.push(drink.strGlass);
    els.detailTags.innerHTML = tags.map(t => `<span>${escapeHtml(t)}</span>`).join('');

    els.detailIngredients.innerHTML = '';
    for (let i = 1; i <= 15; i++){
      const ing = drink['strIngredient' + i];
      const measure = drink['strMeasure' + i];
      if (!ing) continue;
      const li = document.createElement('li');
      li.innerHTML = `<span>${escapeHtml(ing.trim())}</span><span class="measure">${escapeHtml((measure || '').trim())}</span>`;
      els.detailIngredients.appendChild(li);
    }

    els.detailInstructions.textContent = drink.strInstructions || 'No instructions provided.';

    if (opts.fromMood){
      els.moodActions.style.display = 'flex';
      els.moodNote.style.display = opts.relaxed ? 'block' : 'none';
      els.moodNote.textContent = opts.relaxed
        ? "Couldn't find a perfect match for everything you picked, so this one's the closest fit."
        : '';
    } else {
      els.moodActions.style.display = 'none';
      els.moodNote.style.display = 'none';
    }

    els.detailOverlay.classList.add('open');
  }

  function closeDetail(){
    els.detailOverlay.classList.remove('open');
  }

  // ---- Utilities ------------------------------------------------------

  function escapeHtml(str){
    return String(str || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  // ---- Wiring -----------------------------------------------------------

  function setAlcMode(value){
    // Clicking the already-active button turns it off (back to "all").
    // Clicking the other button switches modes outright. Only one mode,
    // or none, is ever active — this mirrors what the old select allowed.
    alcMode = (alcMode === value) ? '' : value;

    els.alcBtnAlcoholic.classList.toggle('active', alcMode === 'Alcoholic');
    els.alcBtnNonalcoholic.classList.toggle('active', alcMode === 'Non alcoholic');

    document.body.classList.remove('mode-alcoholic', 'mode-nonalcoholic');
    if (alcMode === 'Alcoholic') document.body.classList.add('mode-alcoholic');
    if (alcMode === 'Non alcoholic') document.body.classList.add('mode-nonalcoholic');

    applyFilters();
  }

  els.alcBtnAlcoholic.addEventListener('click', () => setAlcMode('Alcoholic'));
  els.alcBtnNonalcoholic.addEventListener('click', () => setAlcMode('Non alcoholic'));

  els.nameSearch.addEventListener('input', debounce(applyFilters, 150));
  els.ingredientSearch.addEventListener('input', debounce(applyFilters, 150));
  els.mainIngredientFilter.addEventListener('change', applyFilters);
  // ---- Mood quiz ------------------------------------------------------

  let moodStep = 0;
  let moodAnswers = {};
  let moodPool = []; // drinks matching the most recent computed result, for "suggest another"
  let moodLastDrink = null;

  function getTopMainIngredients(n){
    // Built from the cached catalog rather than a hardcoded spirit list,
    // so the quiz only ever offers ingredients that actually exist in
    // the data — no dead-end options.
    const counts = {};
    catalog.forEach(d => {
      const ing = (d.strIngredient1 || '').trim();
      if (!ing) return;
      counts[ing] = (counts[ing] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, n).map(([name]) => name);
  }

  function buildQuizSteps(){
    const topIngredients = getTopMainIngredients(6);
    return [
      {
        id: 'alcoholic',
        question: 'Are you drinking tonight?',
        options: [
          { label: 'Yes, something alcoholic', value: 'Alcoholic' },
          { label: 'No, non-alcoholic', value: 'Non alcoholic' },
          { label: 'No preference', value: '' },
        ],
      },
      {
        id: 'spirit',
        question: 'What sounds good right now?',
        options: [
          ...topIngredients.map(i => ({ label: i, value: i })),
          { label: 'Surprise me', value: '' },
        ],
      },
      {
        id: 'category',
        question: 'What kind of drink are you after?',
        // Real strCategory values from the API: Beer, Cocktail, Cocoa,
        // Coffee / Tea, Homemade Liqueur, Ordinary Drink, Other / Unknown,
        // Punch / Party Drink, Shake, Shot, Soft Drink. Curated down to the
        // ones that map to a clear "mood" rather than listing all eleven.
        options: [
          { label: 'A proper cocktail', value: 'Cocktail' },
          { label: 'Something simple', value: 'Ordinary Drink' },
          { label: 'A quick shot', value: 'Shot' },
          { label: 'Party punch', value: 'Punch / Party Drink' },
          { label: 'Surprise me', value: '' },
        ],
      },
    ];
  }

  let quizSteps = [];

  function openMoodQuiz(){
    quizSteps = buildQuizSteps();
    moodStep = 0;
    moodAnswers = {};
    els.moodOverlay.classList.add('open');
    renderMoodStep();
  }

  function closeMoodQuiz(){
    els.moodOverlay.classList.remove('open');
  }

  function renderMoodStep(){
    const step = quizSteps[moodStep];
    const optionsHtml = step.options.map(opt =>
      `<button type="button" class="mood-option-btn" data-value="${escapeAttr(opt.value)}">${escapeHtml(opt.label)}</button>`
    ).join('');

    els.moodStepContainer.innerHTML = `
      <p class="mood-progress">Question ${moodStep + 1} of ${quizSteps.length}</p>
      <p class="mood-question">${escapeHtml(step.question)}</p>
      <div class="mood-options">${optionsHtml}</div>
      ${moodStep > 0 ? '<button type="button" class="mood-back-btn" id="mood-back-btn">Back</button>' : ''}
    `;

    els.moodStepContainer.querySelectorAll('.mood-option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        moodAnswers[step.id] = btn.dataset.value;
        if (moodStep < quizSteps.length - 1){
          moodStep++;
          renderMoodStep();
        } else {
          finishMoodQuiz();
        }
      });
    });

    const backBtn = document.getElementById('mood-back-btn');
    if (backBtn) backBtn.addEventListener('click', () => { moodStep--; renderMoodStep(); });
  }

  function filterByMoodCriteria(criteria){
    return catalog.filter(d => {
      if (criteria.alcoholic && (d.strAlcoholic || '') !== criteria.alcoholic) return false;
      if (criteria.category && (d.strCategory || '') !== criteria.category) return false;
      if (criteria.spirit){
        const ings = getAllIngredients(d).join(' ').toLowerCase();
        if (!ings.includes(criteria.spirit.toLowerCase())) return false;
      }
      return true;
    });
  }

  function computeMoodResult(answers){
    // Try the exact match first, then progressively relax the least-recently-asked
    // constraints (category, then spirit, then alcoholic) so three real preferences
    // never produce a dead end just because that exact combination isn't in the data.
    const attempts = [
      { alcoholic: answers.alcoholic, category: answers.category, spirit: answers.spirit },
      { alcoholic: answers.alcoholic, spirit: answers.spirit },
      { alcoholic: answers.alcoholic },
      {},
    ];
    for (let i = 0; i < attempts.length; i++){
      const pool = filterByMoodCriteria(attempts[i]);
      if (pool.length > 0) return { pool, relaxed: i > 0 };
    }
    return { pool: catalog, relaxed: true };
  }

  function finishMoodQuiz(){
    const { pool, relaxed } = computeMoodResult(moodAnswers);
    moodPool = pool;
    moodLastDrink = pool[Math.floor(Math.random() * pool.length)];
    closeMoodQuiz();
    openDetail(moodLastDrink, { fromMood: true, relaxed });
  }

  els.moodBtn.addEventListener('click', openMoodQuiz);

  function showLanding(){
    els.landingView.style.display = 'flex';
    els.browseView.style.display = 'none';
  }

  function showBrowse(){
    els.landingView.style.display = 'none';
    els.browseView.style.display = 'block';
  }

  els.landingMoodBtn.addEventListener('click', openMoodQuiz);
  els.landingBrowseBtn.addEventListener('click', showBrowse);
  els.homeBtn.addEventListener('click', showLanding);
  els.moodCloseBtn.addEventListener('click', closeMoodQuiz);
  els.moodOverlay.addEventListener('click', (e) => { if (e.target === els.moodOverlay) closeMoodQuiz(); });

  els.moodAnotherBtn.addEventListener('click', () => {
    // Pick a different drink from the same pool where possible, rather than
    // re-running the relax-and-filter logic, so "another" stays fast and
    // doesn't silently change the relaxation note underneath the user.
    let next = moodLastDrink;
    if (moodPool.length > 1){
      while (next === moodLastDrink){
        next = moodPool[Math.floor(Math.random() * moodPool.length)];
      }
    }
    moodLastDrink = next;
    const wasRelaxed = els.moodNote.style.display === 'block';
    openDetail(moodLastDrink, { fromMood: true, relaxed: wasRelaxed });
  });

  els.moodRetakeBtn.addEventListener('click', () => {
    closeDetail();
    openMoodQuiz();
  });

  els.closeDetail.addEventListener('click', closeDetail);
  els.detailOverlay.addEventListener('click', (e) => { if (e.target === els.detailOverlay) closeDetail(); });
  els.refreshBtn.addEventListener('click', async () => {
    await buildCatalog();
    populateMainIngredientFilter();
    applyFilters();
  });
  els.resetBtn.addEventListener('click', async () => {
    const confirmed = confirm('Reset will clear the cached catalog and all filters, then re-download everything from TheCocktailDB. Continue?');
    if (!confirmed) return;
    localStorage.removeItem(CACHE_KEY);
    localStorage.removeItem(CACHE_TIME_KEY);
    els.nameSearch.value = '';
    els.ingredientSearch.value = '';
    els.mainIngredientFilter.value = '';
    alcMode = '';
    els.alcBtnAlcoholic.classList.remove('active');
    els.alcBtnNonalcoholic.classList.remove('active');
    document.body.classList.remove('mode-alcoholic', 'mode-nonalcoholic');
    catalog = [];
    await buildCatalog();
    populateMainIngredientFilter();
    applyFilters();
  });

  function debounce(fn, ms){
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }

  // ---- Init -----------------------------------------------------------

  async function init(){
    const hasCache = loadCatalogFromCache();
    if (hasCache){
      els.loadingOverlay.classList.add('hidden');
      updateStatusLine();
    } else {
      await buildCatalog();
    }
    populateMainIngredientFilter();
    applyFilters();
    showLanding();
  }

  init();
})();
</script>

</body>
</html>
